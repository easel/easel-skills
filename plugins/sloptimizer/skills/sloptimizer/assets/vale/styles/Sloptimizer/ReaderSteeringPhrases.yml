extends: existence
message: "Reader-steering phrase: '%s'. State the concrete reason or consequence instead."
ignorecase: true
level: suggestion
scope:
  - ~heading
tokens:
  - '\bit(?:''|’|`)?s worth (?:noting|saying|flagging|mentioning|remembering|checking|exploring)\b'
  - '\bit is worth (?:noting|saying|flagging|mentioning|remembering|checking|exploring)\b'
  - '\b(?:honestly|interestingly|notably|importantly)\b'
  - '\bwhat stands out\b'
  - '\bhere(?:''|’|`)?s what(?:''|’|`)?s interesting\b'
  - '\bhere(?:''|’|`)?s the thing\b'
  - '\bhere(?:''|’|`)?s what nobody tells you\b'
  - '\blet me be clear\b'
  - '\blet that sink in\b'
  - '\bthe uncomfortable truth is\b'
  - '\bi hope this helps\b'
  - '\bgreat question\b'
  - '\bthe (?:real|actual|genuine) (?:answer|approach|behavior|boundary|constraint|contract|default|design|gate|intent|problem|reason|result|source|takeaway|test|truth|value|version|workflow)\b'
